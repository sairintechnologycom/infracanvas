- id: SEC-018
  title: "RDS Instance Missing Deletion Protection"
  severity: medium
  resource_types: ["aws_db_instance"]
  framework_ids: ["NIST-CP-10", "SOC2-CC9.1", "PCI-DSS-12.3"]
  condition:
    attribute: "deletion_protection"
    operator: "not_equals"
    value: true
  remediation: "Set deletion_protection = true to prevent accidental database deletion"
  description: "RDS instance does not have deletion protection enabled, risking accidental data loss"

- id: SEC-019
  title: "RDS Instance Missing Backup Retention"
  severity: high
  resource_types: ["aws_db_instance"]
  framework_ids: ["CIS-2.3.3", "NIST-CP-9", "SOC2-CC9.1", "PCI-DSS-9.5"]
  condition:
    attribute: "backup_retention_period"
    operator: "equals"
    value: 0
  remediation: "Set backup_retention_period to at least 7 days to enable point-in-time recovery"
  description: "RDS instance has automated backups disabled (backup_retention_period = 0)"

- id: SEC-020
  title: "RDS Instance Missing Enhanced Monitoring"
  severity: info
  resource_types: ["aws_db_instance"]
  framework_ids: ["NIST-AU-12", "SOC2-CC7.2"]
  condition:
    attribute: "monitoring_interval"
    operator: "equals"
    value: 0
  remediation: "Set monitoring_interval to 60 or less and provide a monitoring_role_arn for enhanced monitoring"
  description: "RDS instance does not have enhanced monitoring enabled, reducing operational visibility"

- id: SEC-031
  title: "RDS Instance Storage Not Encrypted"
  severity: high
  resource_types: ["aws_db_instance"]
  framework_ids: ["CIS-2.3.1", "NIST-SC-28", "SOC2-CC6.7", "PCI-DSS-3.4", "HIPAA-164.312(a)(2)(iv)"]
  condition:
    attribute: "storage_encrypted"
    operator: "equals"
    value: false
  remediation: "Set storage_encrypted = true and provide a kms_key_id. Requires snapshot/restore on existing instances."
  description: "RDS instance has unencrypted storage at rest — data, snapshots, and backups are stored in plaintext"

- id: SEC-032
  title: "RDS Instance Has Hardcoded Master Password"
  severity: critical
  resource_types: ["aws_db_instance"]
  framework_ids: ["CIS-1.4", "NIST-IA-5", "SOC2-CC6.1", "PCI-DSS-8.2"]
  condition:
    attribute: "password"
    operator: "not_starts_with"
    value: "${"
  remediation: "Replace the literal password with a reference to a sensitive variable, AWS Secrets Manager, or SSM Parameter Store."
  description: "RDS master password is a hardcoded literal in Terraform source — visible to anyone with repo read access"
