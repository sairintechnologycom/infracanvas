name: CI

on:
  push:
    branches: [main, dev/local-no-auth]
  pull_request:
    branches: [main]

jobs:
  test-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd cli
          pip install -e ".[test,flowmap,shadow]"

      - name: Run tests
        run: |
          cd cli
          pytest -q

  test-viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd viewer && npm ci

      - name: Type check
        run: cd viewer && npx tsc --noEmit

      - name: Run tests
        run: cd viewer && npm test -- --run

      - name: Build
        run: cd viewer && npm run build

  test-agent:
    name: Test agent (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: agent/go.sum

      - name: Verify go.sum is current
        working-directory: agent
        run: |
          go mod download
          go mod verify

      - name: go vet
        working-directory: agent
        run: go vet ./...

      - name: go test -race
        working-directory: agent
        run: go test ./... -race -count=1 -timeout 180s

      - name: go build (smoke)
        working-directory: agent
        env:
          CGO_ENABLED: 0
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: cd cli && ruff check .
