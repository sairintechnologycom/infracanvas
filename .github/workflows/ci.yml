name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd cli
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          cd cli
          pytest --cov=infracanvas --cov-report=term-missing -q

  test-viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd viewer && npm ci

      - name: Type check
        run: cd viewer && npx tsc --noEmit

      - name: Run tests
        run: cd viewer && npm test -- --run

      - name: Build
        run: cd viewer && npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: cd cli && ruff check .
