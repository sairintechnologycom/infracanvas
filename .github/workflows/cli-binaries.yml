name: Build Binaries

on:
  workflow_run:
    workflows: ["Release CLI"]
    types: [completed]

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: infracanvas-linux-amd64
          - os: macos-latest
            artifact: infracanvas-macos-arm64
          - os: windows-latest
            artifact: infracanvas-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          cd cli && pip install -e .

      - name: Build binary
        run: pyinstaller --onefile --name ${{ matrix.artifact }} cli/infracanvas/main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: dist/${{ matrix.artifact }}
