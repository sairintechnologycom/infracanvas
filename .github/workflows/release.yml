# Release pipeline — fires on `git push origin v*` tag.
# Configure PyPI Trusted Publisher once at
#   https://pypi.org/manage/project/infracanvas/settings/publishing/
# with: owner=sairintechnologycom, repo=infracanvas, workflow=release.yml,
# environment=pypi. No PyPI token needed in repo secrets after that.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: infracanvas-linux-amd64
            ext: ""
          - os: macos-14
            artifact: infracanvas-macos-arm64
            ext: ""
          - os: windows-latest
            artifact: infracanvas-windows-x64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd cli
          pip install -e .
          pip install pyinstaller

      - name: Build viewer (for HTML template)
        run: |
          cd viewer
          npm ci
          npm run build

      - name: Build binary
        run: |
          cd cli
          pyinstaller infracanvas.spec

      - name: Rename artifact
        shell: bash
        run: |
          mv cli/dist/infracanvas${{ matrix.ext }} cli/dist/${{ matrix.artifact }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/dist/${{ matrix.artifact }}${{ matrix.ext }}

  build-agent:
    name: Build agent ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: infracanvas-agent-linux-amd64
          - goos: darwin
            goarch: arm64
            artifact: infracanvas-agent-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: agent/go.sum

      - name: Verify deps
        working-directory: agent
        run: |
          go mod download
          go mod verify

      - name: Build agent
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          AGENT_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p ../dist
          go build -ldflags="-s -w -X main.version=${AGENT_VERSION}" \
            -o ../dist/${{ matrix.artifact }} \
            ./cmd/infracanvas-agent

      - name: Smoke test binary (linux only — darwin can't run on ubuntu-latest)
        if: matrix.goos == 'linux'
        env:
          AGENT_ARTIFACT: ${{ matrix.artifact }}
        run: |
          ./dist/${AGENT_ARTIFACT} version
          ver=$(./dist/${AGENT_ARTIFACT} version)
          if [ "$ver" != "${GITHUB_REF_NAME}" ]; then
            echo "Version mismatch: got '$ver', expected '${GITHUB_REF_NAME}'" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build viewer
        run: |
          cd viewer
          npm ci
          npm run build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: []
    environment:
      name: pypi
      url: https://pypi.org/project/infracanvas/
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build viewer (for package inclusion)
        # viewer/package.json has a `postbuild` hook that copies dist/index.html
        # to ../cli/infracanvas/export/viewer_template.html — no extra cp needed.
        run: cd viewer && npm ci && npm run build

      - name: Build package
        run: |
          cd cli
          pip install hatchling
          python -m hatchling build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker, publish-pypi, build-agent]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: infracanvas-linux-amd64
          path: artifacts/infracanvas-linux-amd64

      - uses: actions/download-artifact@v4
        with:
          name: infracanvas-macos-arm64
          path: artifacts/infracanvas-macos-arm64

      - uses: actions/download-artifact@v4
        with:
          name: infracanvas-windows-x64
          path: artifacts/infracanvas-windows-x64

      - uses: actions/download-artifact@v4
        with:
          name: infracanvas-agent-linux-amd64
          path: artifacts/infracanvas-agent-linux-amd64

      - uses: actions/download-artifact@v4
        with:
          name: infracanvas-agent-macos-arm64
          path: artifacts/infracanvas-agent-macos-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/infracanvas-linux-amd64/infracanvas-linux-amd64
            artifacts/infracanvas-macos-arm64/infracanvas-macos-arm64
            artifacts/infracanvas-windows-x64/infracanvas-windows-x64.exe
            artifacts/infracanvas-agent-linux-amd64/infracanvas-agent-linux-amd64
            artifacts/infracanvas-agent-macos-arm64/infracanvas-agent-macos-arm64
          generate_release_notes: true
