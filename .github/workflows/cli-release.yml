# NOTE: Before first publish, configure PyPI Trusted Publisher at:
# https://pypi.org/manage/project/infracanvas/settings/publishing/
# Use: owner=infracanvas, repo=infracanvas, workflow=cli-release.yml
# This workflow uses OIDC (id-token: write) — no API token needed.
name: Release CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build viewer
        run: |
          cd viewer && npm ci && npm run build
          mkdir -p ../cli/infracanvas/export
          cp dist/index.html ../cli/infracanvas/export/viewer_template.html

      - name: Build Python package
        run: |
          cd cli
          pip install hatchling
          python -m hatchling build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist/*
          generate_release_notes: true
