# InfraCanvas backend — Fly.io PROD environment (CONTEXT D-12, D-14).
# Deploy: flyctl deploy -c backend/fly.prod.toml
#
# Differs from fly.dev.toml ONLY in:
#   - app name (infracanvas-api-prod)
#   - [env] ENV = "prod"
# Phase 6 keeps min_machines_running = 1 on both processes to respect the
# $10–104/mo budget ceiling (PROJECT.md Constraints). Bumping to 2+ is a
# Phase 7 / revenue-gated decision.

app = "infracanvas-api-prod"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[deploy]
  release_command = "alembic -c /app/alembic.ini upgrade head"
  release_command_timeout = "15m"
  strategy = "rolling"

[processes]
  api    = "uvicorn app.main:app --host 0.0.0.0 --port 8080 --no-access-log"
  worker = "taskiq worker app.queue.broker:broker app.queue.tasks"

[env]
  ENV = "prod"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

[[services.http_checks]]
  interval = "10s"
  timeout = "2s"
  method = "GET"
  path = "/healthz"

# API Machine
[[vm]]
  processes = ["api"]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Worker Machine — auto_stop intentionally omitted (RESEARCH § P5).
[[vm]]
  processes = ["worker"]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
